name: Update profile cards

on:
  schedule:
    - cron: "0 12 * * *"   # daily at 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # Default fetch-depth: 1 and persist-credentials: true are intentional.
      # The shallow clone is sufficient (we only commit on top of HEAD), and
      # persisted credentials are what makes the `git push` below work.
      - uses: actions/checkout@v4

      - name: Fetch cards
        # GitHub Actions runs `run` steps under `bash -eo pipefail`, so a
        # `curl -fsSL` 404 will exit the step before any commit. Partial
        # fetches do not produce a stale commit; the workflow run fails
        # loudly instead. To loosen that and accept partials, add
        # `|| true` per-line.
        run: |
          mkdir -p assets/cards
          for repo in tawtui claude-code-usage-statusline lumentui; do
            curl -fsSL --max-time 30 "https://svg.bookmark.style/api?url=https://github.com/victorstein/$repo&mode=dark&style=horizontal" \
              -o "assets/cards/$repo.svg"
          done

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/cards/
          if git diff --staged --quiet; then
            echo "No card changes."
          else
            git commit -m "chore: refresh profile cards"
            # Rebase any concurrent push (e.g. a Tofu apply rewriting
            # update-cards.yml between our checkout and our push) before
            # pushing, so we don't fail non-fast-forward.
            git pull --rebase origin main
            git push
          fi
